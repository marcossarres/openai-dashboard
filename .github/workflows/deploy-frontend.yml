name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project name (e.g., test)'
        required: true
        type: string
      domain:
        description: 'Root domain (e.g., moneyclip.com.br)'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  DEFAULT_PROJECT_NAME: test
  DEFAULT_DOMAIN: moneyclip.com.br

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ github.event.inputs.project_name || env.DEFAULT_PROJECT_NAME }}
      DOMAIN_NAME: ${{ github.event.inputs.domain || env.DEFAULT_DOMAIN }}
      S3_BUCKET: ${{ format('{0}.{1}', github.event.inputs.project_name || env.DEFAULT_PROJECT_NAME, github.event.inputs.domain || env.DEFAULT_DOMAIN) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 bucket exists
        run: |
          aws s3 ls "s3://$S3_BUCKET" || aws s3 mb "s3://$S3_BUCKET" --region $AWS_REGION
          aws s3 website "s3://$S3_BUCKET" --index-document index.html --error-document index.html

      - name: Build frontend and sync dist/ to S3
        run: |
          npm --prefix frontend run build
          aws s3 sync frontend/dist "s3://$S3_BUCKET" \
            --delete \
            --cache-control "public, max-age=300"
