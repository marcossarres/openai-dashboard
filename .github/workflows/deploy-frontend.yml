name: Deploy Frontend to S3

on:
  push:
    branches:
      - agent/claudev
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      projectname:
        description: 'Project name (e.g. newsite)'
        required: true
        default: 'openai-dashboard'
      domain:
        description: 'Domain (e.g. moneyclip.com.br)'
        required: true
        default: 'moneyclip.com.br'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ format('{0}.{1}', github.event.inputs.projectname || 'openai-dashboard', github.event.inputs.domain || 'moneyclip.com.br') }}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 bucket exists
        run: |
          aws s3 ls "s3://$S3_BUCKET" || aws s3 mb "s3://$S3_BUCKET" --region $AWS_REGION
          aws s3 website "s3://$S3_BUCKET" --index-document index.html --error-document index.html

      - name: Sync dist/ to S3
        run: |
          aws s3 sync frontend/dist "s3://$S3_BUCKET" \
            --delete \
            --cache-control "public, max-age=300"
