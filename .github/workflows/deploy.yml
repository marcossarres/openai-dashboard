name: Build & Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: openai-dashboard-backend
  FRONTEND_IMAGE: openai-dashboard-frontend
  ECS_CLUSTER: openai-dashboard
  BACKEND_SERVICE: openai-dashboard-backend
  FRONTEND_SERVICE: openai-dashboard-frontend
  BACKEND_TASK_DEF: openai-dashboard-backend
  FRONTEND_TASK_DEF: openai-dashboard-frontend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for REPO in $BACKEND_IMAGE $FRONTEND_IMAGE; do
            aws ecr describe-repositories --repository-names $REPO --region $AWS_REGION \
              || aws ecr create-repository --repository-name $REPO --region $AWS_REGION
          done

      - name: Build & push backend image
        id: build-backend
        working-directory: backend
        run: |
          IMAGE=$ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & push frontend image
        id: build-frontend
        working-directory: frontend
        run: |
          IMAGE=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Download backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $BACKEND_TASK_DEF \
            --query taskDefinition \
            > backend-task-def.json

      - name: Update backend task definition image
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ steps.build-backend.outputs.image }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $FRONTEND_TASK_DEF \
            --query taskDefinition \
            > frontend-task-def.json

      - name: Update frontend task definition image
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ steps.build-frontend.outputs.image }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
