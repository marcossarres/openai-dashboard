name: Deploy Backend to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project name (e.g., newproj)'
        required: true
        type: string
      domain:
        description: 'Root domain (e.g., moneyclip.com.br)'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 915759771410.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ github.event.inputs.project_name || 'test' }}
      DOMAIN_NAME: ${{ github.event.inputs.domain || 'moneyclip.com.br' }}
      ECR_REPOSITORY: ${{ format('{0}-{1}-ecr-repo', github.event.inputs.project_name || 'test', github.event.inputs.domain || 'moneyclip.com.br') }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION \
            || aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push Docker image
        run: |
          TAG=${{ github.sha }}
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
