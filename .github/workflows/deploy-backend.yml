name: Deploy Backend to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      projectname:
        description: 'Project name (e.g. newsite)'
        required: true
        default: 'openai-dashboard'
      domain:
        description: 'Domain (e.g. moneyclip.com.br)'
        required: true
        default: 'moneyclip.com.br'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 915759771410.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve ECR repository name
        id: ecr
        run: |
          PROJECT="${{ inputs.projectname || 'openai-dashboard' }}"
          DOMAIN_SLUG=$(echo "${{ inputs.domain || 'moneyclip.com.br' }}" | tr '.' '-')
          echo "repo=${PROJECT}-${DOMAIN_SLUG}-ecr" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names ${{ steps.ecr.outputs.repo }} --region $AWS_REGION \
            || aws ecr create-repository --repository-name ${{ steps.ecr.outputs.repo }} --region $AWS_REGION

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push Docker image
        run: |
          REPO=${{ steps.ecr.outputs.repo }}
          TAG=${{ github.sha }}
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$REPO:$TAG \
            -t $ECR_REGISTRY/$REPO:latest \
            ./backend
          docker push $ECR_REGISTRY/$REPO:$TAG
          docker push $ECR_REGISTRY/$REPO:latest
